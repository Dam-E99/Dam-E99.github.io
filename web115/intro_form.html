<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://lint.page/kit/880bd5.js" crossorigin="anonymous"></script>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/brand.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Open+Sans:wght@400;600&family=Poppins:ital,wght@1,500&display=swap" rel="stylesheet">
    <title>Danny Soto Duarte's Dazzling Dodo 🐾 WEB115 - Introduction Form</title>
</head>
<body>
    <div data-include="components/header.html"></div>
<main>
    <h2>Introduction Form</h2>

    <form >
        <fieldset>
            <label for="first_name">First Name: </label>
            <input type="text" id="first_name" value="Danny" required>
    

            <label for="middle_initial">Middle Initial: </label>
            <input type="text" id="middle_initial" maxlength="1">

            <label for="last_name">Last Name: </label>
            <input type="text" id="last_name" value="Soto Duarte" required>

            </fieldset>

        <fieldset>
            <legend>Background Information</legend>

            <label for="personal">Personal Background: </label>
            <textarea id="personal" required rows="4">
I am Mexican but was born in SC and moved to NC while I was a year old and grew up here my whole life. I have 4 older brothers; I am the youngest at 20 years old.
            </textarea>

            <label for="professional">Professional Background: </label>
            <textarea id="professional" required rows="4">
I have not had a professional job before although my mom has a small dog sitting company and I have helped out with that before.
            </textarea>

            <label for="academic">Academic Background: </label>
            <textarea id="academic" required>
My goal is Full Stack Programming AAS, and this is my second year.
            </textarea>

            <label for="computer">Primary Computer: </label>
            <input type="text" id="computer" value="Apple MacBook Air laptop, MacOS, primary location at home on my desk" required>
        </fieldset>

        <fieldset id="courseFields">
            <legend>Courses & Why</legend>
            <div id="courseContainer">
        
                <div class="course-entry">
                    <label>Course 1:</label>
                    <input type="text" class="course-input" 
                        value="ENG111 – Writing and Inquiry: This is a required course for my AAS degree." required>
                </div>
                
                <div class="course-entry">
                    <label>Course 2:</label>
                    <input type="text" class="course-input" 
                        value="WEB250 – Database Driven Websites: This is a major requirement for my degree. This course will teach me about PHP and NodeJS among other back-end development programs." required>
                </div>
            
                <div class="course-entry">
                    <label>Course 3:</label>
                    <input type="text" class="course-input" 
                        value="WEB115 – Web Markup and Scripting: This is a major requirement for my degree. This course will teach me about front-end development like JavaScript, HTML, etc." required>
                </div>
            </div>
            <button type="button" id="addCourseBtn">Add Course</button>
        </fieldset>

        <button type="submit" id="submitBtn">Submit Introduction</button>
    </form>

    <section id="output"></section>
</main>
    <div data-include="components/footer.html"></div>
    <script src="scripts/intro_form.js"></script>
    <script src="scripts/HTMLInclude.js"></script>
</body>
</html>

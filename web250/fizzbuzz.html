<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles/default.css" />
    <script src="https://lint.page/kit/880bd5.js" crossorigin="anonymous"></script>
    <script src="fizzbuzz.html"></script>
    <title>Danny Soto Duarte's Dazzling Dodo 🐾 WEB250 FizzBuzz</title>
</head>
<body>

<h1>🦤 Dazzling Dodo FizzBuzz!</h1>

<form id="fizzForm">

    <!-- Row 1: Name -->
    <div class="row">
        <input type="text" id="first" placeholder="First Name" required value="Danny">
        <input type="text" id="middle" placeholder="M.I." maxlength="1">
        <input type="text" id="last" placeholder="Last Name" required value="Soto">
    </div>

    <!-- Row 2: Default + Count -->
    <div class="row">
        <input type="text" id="defaultWord" placeholder="Default Word" value="Dodo">
        <input type="number" id="count" placeholder="Count" value="111">
    </div>

    <!-- Row 3: Words + Divisors -->
    <div class="row">
        <input type="text" id="word1" placeholder="Word 1" value="Fizz">
        <input type="number" id="div1" placeholder="Divisor 1" value="3">

        <input type="text" id="word2" placeholder="Word 2" value="Buzz">
        <input type="number" id="div2" placeholder="Divisor 2" value="5">

        <input type="text" id="word3" placeholder="Word 3" value="Bang">
        <input type="number" id="div3" placeholder="Divisor 3" value="7">
    </div>

    <button type="submit">Generate</button>

</form>

<h3 id="welcome"></h3>
<ul id="output"></ul>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles/default.css" />
    <script src="https://lint.page/kit/880bd5.js" crossorigin="anonymous"></script>
    <title>Danny Soto Duarte's Dazzling Dodo 🐾 WEB250 FizzBuzz</title>
</head>
<body>

    <div data-include="components/header.html"></div>

<main>
    <h2>FizzBuzz!</h2>
    <form id="fizzForm">

    <!-- Row 1: Name -->
    <div class="row">
        <div class="field">
            <label for="first">First Name</label>
            <input type="text" id="first" required value="Danny" oninput="this.value = this.value.replace(/[^A-Za-z]/g, ''>
        </div>

        <div class="field">
            <label for="middle">Middle Initial</label>
            <input type="text" id="middle" maxlength="1" oninput="this.value = this.value.replace(/[^A-Za-z]/g, '')">
        </div>

        <div class="field">
            <label for="last">Last Name</label>
            <input type="text" id="last" required value="Soto" oninput="this.value = this.value.replace(/[^A-Za-z]/g, ''>
        </div>
    </div>

    <!-- Row 2 -->
    <div class="row">
        <div class="field">
            <label for="defaultWord">Default Word</label>
            <input type="text" id="defaultWord" value="Dodo">
        </div>

        <div class="field">
            <label for="count">Count</label>
            <input type="number" id="count" value="111">
        </div>
    </div>

    <!-- Row 3 -->
    <div class="row">
        <div class="field">
            <label for="word1">Word 1</label>
            <input type="text" id="word1" value="Fizz">
            <label for="div1">Divisor 1</label>
            <input type="number" id="div1" value="3">
        </div>

        <div class="field">
            <label for="word2">Word 2</label>
            <input type="text" id="word2" value="Buzz">
            <label for="div2">Divisor 2</label>
            <input type="number" id="div2" value="5">
        </div>

        <div class="field">
            <label for="word3">Word 3</label>
            <input type="text" id="word3" value="Bang">
            <label for="div3">Divisor 3</label>
            <input type="number" id="div3" value="7">
        </div>
    </div>

    <button type="submit">Submit</button>
</form>

    <h3 id="welcome" class="text-center">Try it out!</h3>
    <ul id="output"></ul>
</main>

    <div data-include="components/footer.html"></div>

<script src="scripts/fizzbuzz.js"></script>
<script src="scripts/HTMLInclude.js"></script>
</body>
</html>
